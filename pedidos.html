<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos | Arte Azucarada</title>
    <link rel="stylesheet" href="pedidos.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="Arte_Azucarada_logo_2.png" alt="LOGO">
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

</header>

<main>

    <h1>Realiza tu Pedido</h1>

    <p>
        Llena el formulario y nuestro equipo se pondrá en contacto
        para confirmar tu pedido personalizado.
    </p>

    <form>

        <label>
            Nombre completo

            <input type="text"
            required
            placeholder="Tu nombre">
        </label>

        <label>
            Correo electrónico

            <input type="email"
            required
            placeholder="tu@email.com">
        </label>

        <label>
            Producto

            <select>
                <option>Torta personalizada</option>
                <option>Cupcakes</option>
                <option>Galletas</option>
                <option>Brownies</option>
            </select>
        </label>

        <label>
            Detalles del pedido

            <textarea rows="4"
            placeholder="Escribe tus ideas, sabores y decoración"></textarea>
        </label>

        <button class="boton-comprar">
            Enviar pedido
        </button>

    </form>

</main>

<footer>

    <div class="footer-contenido">

        <div class="footer-seccion">
            <p>© 2026 Arte Azucarada</p>
        </div>

    </div>

</footer>

</body>
</html>
